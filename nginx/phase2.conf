server {
    listen 80;
    server_name _;

    # Trust the Docker network subnet for the internal WireGuard IPs
    # Assuming linuxserver/wireguard handles the 10.0.0.0/24 NAT
    allow 10.0.0.0/24; 
    allow 172.16.0.0/12; # Allow Docker bridge networks 
    deny  all;

    auth_basic           "OpenClaw Admin";
    auth_basic_user_file /etc/openclaw/.htpasswd;

    location / {
        proxy_pass         http://admin-server:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
